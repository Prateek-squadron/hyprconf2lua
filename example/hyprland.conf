# =============================================================================
# Hyprland Config - sample for testing hyprconf2lua
# =============================================================================

# General appearance
general {
    gaps_in  = 5
    gaps_out = 20
    border_size = 2
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)
    layout = dwindle
}

# Decoration
decoration {
    rounding = 10
    active_opacity = 1.0
    inactive_opacity = 1.0
    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }
    blur {
        enabled = true
        size = 3
        passes = 1
    }
}

# Animations
animations {
    enabled = true
}

# Input
input {
    kb_layout = us
    kb_variant = colemak
    follow_mouse = 1
    touchpad {
        natural_scroll = false
    }
}

# Misc
misc {
    force_default_wallpaper = -1
}

# Variables
$mainMod = SUPER

# Monitor
monitor = eDP-1, 1920x1080@60, 0x0, 1.0
monitor = HDMI-A-1, 2560x1440@144, 1920x0, 1

# Keybindings
bind = $mainMod, Q, exec, kitty
bind = $mainMod, C, killactive
bind = $mainMod, F, fullscreen
bind = $mainMod SHIFT, F, togglefloating
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, 1, workspace, 1
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod, mouse:272, movewindow
bind = $mainMod, mouse:273, resizewindow
bindl = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindl = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindr = $mainMod, mouse_down, workspace, e+1
bindm = $mainMod, mouse:272, movewindow
binde = $mainMod, mouse:273, resizewindow

# Mouse bindings
bind = $mainMod, mouse:272, mouse, 272
bind = $mainMod, mouse:273, mouse, 273

# Window rules
windowrule = float, ^(pavucontrol)$
windowrule = float, ^(blueman-manager)$
windowrule = noborder, ^(xdg-desktop-portal-hyprland)$
windowrulev2 = opacity 0.8 0.8, class:^(kitty)$, title:^(.*)$
windowrulev2 = float, class:^(file_progress)$, title:^(.*)$
windowrulev2 = noshadow, class:^($|xdg-desktop-portal-hyprland), title:^

# Workspace rules
workspace = 1, monitor:HDMI-A-1, default:true
workspace = 2, monitor:HDMI-A-1

# Layer rules
layerrule = blur, ^(waybar)$
layerrule = noanim, ^(mako)$

# Environment
env = XCURSOR_SIZE, 24
env = GDK_BACKEND, wayland,x11

# Autostart
exec-once = waybar
exec-once = mako
exec-once = nm-applet &
exec = swaybg -i ~/wallpaper.jpg

# Beziers and animations
bezier = myBezier, 0.05, 0.9, 0.1, 1.0
animation = windows, 1, 4, myBezier
animation = fade, 1, 2, default
animation = workspaces, 1, 3, default, slide

# Device config
device:epic-mouse-v1 {
    sensitivity = -0.5
}

# Gestures
gesture {
    workspace_swipe = true
    workspace_swipe_fingers = 3
}

# Source includes
source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/bindings.conf
